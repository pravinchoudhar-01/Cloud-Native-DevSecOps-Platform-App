apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}    # mongodb-svc — backend uses this name
  namespace: {{ .Values.namespace }}
  labels:
    app: mongodb
spec:
  type: ClusterIP       # internal only — backend talks to this
  selector:
    app: mongodb
  ports:
    - name: mongodb
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.container.port }}
